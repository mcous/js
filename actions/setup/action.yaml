name: Set up Node
description: Install Node, pnpm, and dependencies with caching

inputs:
  setup-node:
    description: Configure Node.js
    default: 'true'
  setup-pnpm:
    description: Configure pnpm
    default: 'true'
  node-version:
    description: Node.js version to install.
    default: '24'
  registry-url:
    description: Registry to configure for publish
  run-install:
    description: Run pnpm install
    default: 'true'

runs:
  using: composite
  steps:
    - name: Install Node.js ${{ inputs.node-version }}
      if: ${{ inputs.setup-node == 'true' }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.registry-url }}

    - name: Install pnpm
      if: ${{ inputs.setup-pnpm == 'true' }}
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      with:
        cache: true
        standalone: ${{ inputs.setup-node != 'true' }}
        run_install: ${{ inputs.run-install }}
